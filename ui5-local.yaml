# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: pm11.zpm11nftcreate
type: application
framework:
  name: SAPUI5
  version: 1.136.0
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ushell
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
        backend:
          - path: /sap
            url: https://www.z4q.dynu.net:8443
            client: '100'
          - url: https://www.z4q.dynu.net:8443
            client: '100'
            authenticationType: basic
            path: /sap/opu/odata/sap/EAM_NTF_CREATE/
    - name: sap-fe-mockserver
      beforeMiddleware: csp
      configuration:
        mountPath: /
        services:
          - urlPath: /sap/opu/odata/pm11/_MAINTNOTIFICATION
            metadataPath: ./webapp/localService/mainService/metadata.xml
            mockdataPath: ./webapp/localService/mainService/data
            generateMockData: true
          - urlPath: /sap/opu/odata/pm11/UI_CREATENOTIF
            metadataPath: ./webapp/localService/mainService/metadata.xml
            mockdataPath: ./webapp/localService/mainService/data
            generateMockData: true
          - urlPath: /sap/opu/odata/sap/EAM_NTF_CREATE
            metadataPath: ./webapp/localService/EAM_NTF_CREATE/metadata.xml
            mockdataPath: ./webapp/localService/EAM_NTF_CREATE/data
            generateMockData: true
        annotations:
          - localPath: ./webapp/localService/mainService/PM11__MAINTNOTIFICATION_VAN.xml
            urlPath: /sap/opu/odata/IWFND/CATALOGSERVICE;v=2/Annotations(TechnicalName='%2FPM11%2F_MAINTNOTIFICATION_VAN',Version='0001')/$value/
          - localPath: ./webapp/localService/mainService/PM11__MAINTNOTIFICATION_VAN.xml
            urlPath: /sap/opu/odata/IWFND/CATALOGSERVICE;v=2/Annotations(TechnicalName='%2FPM11%2FUI_CREATENOTIF_VAN',Version='0001')/$value/
